name: Build Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Create plugin zip
        run: |
          PLUGIN_SLUG="alynt-drime-wpvivid-uploader"
          VERSION="${{ github.event.release.tag_name }}"

          mkdir -p build/${PLUGIN_SLUG}

          rsync -av --exclude='.git' \
                    --exclude='.github' \
                    --exclude='build' \
                    --exclude='node_modules' \
                    --exclude='vendor' \
                    --exclude='tests' \
                    --exclude='scripts' \
                    --exclude='docs' \
                    --exclude='coverage' \
                    --exclude='assets/src' \
                    --exclude='assets/dist' \
                    --exclude='.gitignore' \
                    --exclude='.gitattributes' \
                    --exclude='.phpcs.xml' \
                    --exclude='.phpcs.xml.dist' \
                    --exclude='.editorconfig' \
                    --exclude='.windsurfrules' \
                    --exclude='phpunit.xml' \
                    --exclude='phpunit.xml.dist' \
                    --exclude='composer.json' \
                    --exclude='composer.lock' \
                    --exclude='composer.phar' \
                    --exclude='package.json' \
                    --exclude='package-lock.json' \
                    --exclude='deploy.sh' \
                    --exclude='deploy.example.sh' \
                    --exclude='session-context.tmp.md' \
                    --exclude='session-handoff.tmp.md' \
                    --exclude='README.md' \
                    --exclude='CHANGELOG.md' \
                    --exclude='*.map' \
                    --exclude='RELEASE-*.md' \
                    ./ build/${PLUGIN_SLUG}/

          cd build
          zip -r ${PLUGIN_SLUG}-${VERSION}.zip ${PLUGIN_SLUG}

          echo "ZIP_FILE=${PLUGIN_SLUG}-${VERSION}.zip" >> $GITHUB_ENV

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: build/${{ env.ZIP_FILE }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
